# Stack di sviluppo locale: PostgreSQL + Kafka (in modalita KRaft, senza ZooKeeper).
#
#   docker compose up -d                 avvia solo l'infrastruttura (DB + Kafka)
#   docker compose --profile app up -d   avvia anche l'applicazione (build dal Dockerfile)
#
# L'applicazione lanciata da IDE/Maven usa i valori di default di application.yml
# (localhost:5432 e localhost:9092), quindi basta l'infrastruttura.

services:

  postgres:
    image: postgres:16-alpine
    container_name: protocollo-postgres
    environment:
      POSTGRES_DB: protocollo
      POSTGRES_USER: protocollo
      POSTGRES_PASSWORD: protocollo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protocollo"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: protocollo-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      # Listener interno (tra container) e listener host (per l'app su localhost)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Identificativo del cluster KRaft (qualsiasi base64 valido va bene)
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  # Interfaccia web per ispezionare topic e messaggi: http://localhost:8081
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: protocollo-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: locale
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # Object storage S3-compatibile per i PDF (usato dal profilo "prod").
  # Console web di MinIO: http://localhost:9001 (utente/password: minioadmin)
  minio:
    image: minio/minio:latest
    container_name: protocollo-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  # L'applicazione: avviata solo con il profilo "app".
  # Gira in profilo Spring "prod" cosi da usare MinIO come object storage.
  app:
    build: .
    container_name: protocollo-app
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/protocollo
      DB_USERNAME: protocollo
      DB_PASSWORD: protocollo
      KAFKA_BOOTSTRAP: kafka:29092
      JWT_SECRET: chiave-segreta-di-sviluppo-da-cambiare-in-produzione-1234567890
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: protocollo

volumes:
  postgres-data:
  minio-data:
