spring:
  application:
    name: protocollo-api

  # Profilo attivo: "dev" (storage locale) di default, "prod" per S3/MinIO.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # --- Database (PostgreSQL) ---
  # I valori si possono sovrascrivere con variabili d'ambiente (utile in Docker/Kubernetes).
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/protocollo}
    username: ${DB_USERNAME:protocollo}
    password: ${DB_PASSWORD:protocollo}

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      # Lo schema e gestito da Flyway: Hibernate si limita a VALIDARE che le
      # entita corrispondano alle tabelle, senza modificarle.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        # Lavorare in UTC rende deterministico il mapping dei campi temporali
        jdbc:
          time_zone: UTC
        format_sql: true
    show-sql: false

  # --- Flyway (migrazioni del database) ---
  flyway:
    enabled: true
    locations: classpath:db/migration

  # --- Kafka ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Serializza il valore del messaggio in JSON
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Non aggiungiamo header con il tipo Java: i consumer possono essere scritti in altri linguaggi
        spring.json.add.type.headers: false
    consumer:
      group-id: protocollo-indice
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Avvolgo il JsonDeserializer in un ErrorHandlingDeserializer: un messaggio
      # malformato ("poison pill") non blocca il consumo, viene solo scartato.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: dev.protocollo.messaging
        # L'indice esterno non invia header di tipo: uso un tipo di default
        spring.json.use.type.headers: false
        spring.json.value.default.type: dev.protocollo.messaging.IndiceAggiornamentoEvent

# --- Proprieta applicative personalizzate ---
app:
  jwt:
    # IMPORTANTE: in produzione la chiave va passata come segreto, mai versionata.
    # Deve essere lunga almeno 32 caratteri (256 bit) per l'algoritmo HMAC-SHA256.
    secret: ${JWT_SECRET:chiave-segreta-di-sviluppo-da-cambiare-in-produzione-1234567890}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  kafka:
    topic-protocollazione: ${KAFKA_TOPIC:protocollo.documenti.protocollazione}
    topic-indice: ${KAFKA_TOPIC_INDICE:protocollo.indice.aggiornamenti}
    # Coda di lavoro della protocollazione automatica (vedi ProtocollazioneConsumer)
    topic-protocollazione-lavoro: ${KAFKA_TOPIC_PROTOCOLLAZIONE_LAVORO:protocollo.documenti.protocollazione.richieste}
  # Workflow di approvazione: ritardo prima della protocollazione automatica e
  # frequenza con cui il job di scansione cerca documenti approvati scaduti
  protocollazione:
    ritardo-secondi: ${PROTOCOLLAZIONE_RITARDO_SECONDI:60}
    intervallo-controllo-ms: ${PROTOCOLLAZIONE_INTERVALLO_MS:10000}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    capacity: ${RATE_LIMIT_CAPACITY:100}
    refill-per-minute: ${RATE_LIMIT_REFILL:100}
  # Intervallo (ms) con cui il publisher dell'outbox cerca eventi da inviare
  outbox:
    polling-delay: ${OUTBOX_POLLING_DELAY:5000}
  # Servizi a cui l'utente risulta accreditato (finiscono nel PDF)
  accreditamento:
    servizi:
      - Gestione Documentale
      - Archiviazione Digitale
      - API Gateway
  # Microservizio esterno di profilo (ipotetico) chiamato via RestClient
  servizio-profilo:
    base-url: ${PROFILO_BASE_URL:http://localhost:9099}
  # Origin consentite per le richieste CORS (es. la SPA frontend in sviluppo)
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# --- Documentazione OpenAPI / Swagger ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html

# --- Actuator (osservabilita) ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# --- Logging ---
logging:
  level:
    root: INFO
    dev.protocollo: DEBUG
