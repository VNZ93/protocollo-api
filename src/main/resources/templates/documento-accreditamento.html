<!DOCTYPE html>
<!--
    Template XHTML del documento di accreditamento.

    I segnaposto ${...} vengono sostituiti a runtime da DocumentoPdfService.
    Deve restare XHTML valido (tag chiusi, attributi tra virgolette) perche
    Flying Saucer lo rende in PDF come fosse una pagina web con CSS.
-->
<html xmlns="http://www.w3.org/1999/xhtml" lang="it">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <style type="text/css">
        body { font-family: Helvetica, Arial, sans-serif; font-size: 12px; color: #222; }
        h1 { font-size: 20px; margin-bottom: 4px; }
        h2 { font-size: 14px; margin-top: 18px; border-bottom: 1px solid #ccc; padding-bottom: 2px; }
        .protocollo { color: #555; font-size: 11px; margin-top: 0; }
        .etichetta { font-weight: bold; }
        ul { margin-top: 6px; }
        li { margin-bottom: 3px; }
        .contenuto { margin-top: 6px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>${titolo}</h1>
    <p class="protocollo">Protocollo n. ${numeroProtocollo} - ${dataCreazione}</p>

    <h2>Dati dell'utente</h2>
    <p><span class="etichetta">Nome e cognome:</span> ${nomeCompleto}</p>
    <p><span class="etichetta">Email:</span> ${email}</p>
    <p><span class="etichetta">Utenza:</span> ${proprietario}</p>

    <h2>Servizi a cui l'utente e accreditato</h2>
    <ul>
        ${servizi}
    </ul>

    <h2>Note</h2>
    <div class="contenuto">${contenuto}</div>
</body>
</html>
